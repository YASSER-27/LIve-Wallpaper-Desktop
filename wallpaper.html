<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #000;
        }

        #wallpaper-container {
            width: 100%;
            height: 100%;
            position: relative;
            transition: filter 0.3s ease;
            /* Smooth blur transition */
        }

        video,
        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="wallpaper-container">
        <video id="bg-video" autoplay muted loop playsinline class="hidden"></video>
        <img id="bg-image" class="hidden" alt="Background">
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        const container = document.getElementById('wallpaper-container');
        const video = document.getElementById('bg-video');
        const image = document.getElementById('bg-image');

        function setBlur(value) {
            container.style.filter = `blur(${value}px)`;
        }

        ipcRenderer.on('update-wallpaper', (event, item) => {
            console.log('Update wallpaper on desktop:', item.url);

            if (item.blur !== undefined) setBlur(item.blur);

            // Clear current
            video.pause();
            video.src = '';
            video.classList.add('hidden');

            image.src = '';
            image.classList.add('hidden');

            if (item.type === 'video') {
                video.src = item.url;
                video.classList.remove('hidden');
                video.load();
                video.play().catch(e => console.error('Desktop Video Play Error:', e));
            } else {
                image.src = item.url;
                image.classList.remove('hidden');
            }
        });

        ipcRenderer.on('update-blur', (event, blurValue) => {
            setBlur(blurValue);
        });
    </script>
</body>

</html>
